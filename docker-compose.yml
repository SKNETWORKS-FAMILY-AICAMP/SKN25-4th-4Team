services:
  fastapi:
    build:
      context: ./backend
      dockerfile: Dockerfile.fastapi
    container_name: biorag-fastapi
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./scripts:/scripts  
      - chroma-data:/app/data/chroma
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  django:
    build:
      context: ./backend
      dockerfile: Dockerfile.django
    container_name: biorag-django
    env_file:
      - .env
    ports:
      - "8001:8001"
    volumes:
      - ./backend:/app
      - chroma-data:/app/data/chroma
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: biorag-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_BACKEND_URL=http://localhost:8000
      - VITE_DJANGO_URL=http://localhost:8001
    depends_on:
      - fastapi
      - django
    restart: unless-stopped

  airflow:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    container_name: biorag-airflow
    env_file:
      - .env
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__WEBSERVER__SECRET_KEY=biorag-airflow-secret-2024
      - AIRFLOW_HOME=/opt/airflow
      - PYTHONPATH=/opt/biorag
      - _AIRFLOW_WWW_USER_USERNAME=admin
      - _AIRFLOW_WWW_USER_PASSWORD=admin1234
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./backend:/opt/biorag
      - airflow-db:/opt/airflow
      - chroma-data:/opt/biorag/data/chroma
    ports:
      - "8080:8080"
    command: standalone
    depends_on:
      - fastapi
    restart: unless-stopped

volumes:
  chroma-data:
  django-data:
  airflow-db: