services:
  fastapi:
    build:
      context: ./backend
      dockerfile: Dockerfile.fastapi
    container_name: biorag-fastapi
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./scripts:/scripts  
      - chroma-data:/app/data/chroma
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  django:
    build:
      context: ./backend
      dockerfile: Dockerfile.django
    container_name: biorag-django
    env_file:
      - .env
    ports:
      - "8001:8001"
    volumes:
      - ./backend:/app
      - chroma-data:/app/data/chroma
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: biorag-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_BACKEND_URL=http://localhost:8000
      - VITE_DJANGO_URL=http://localhost:8001
    depends_on:
      - fastapi
      - django
    restart: unless-stopped

volumes:
  chroma-data:
  django-data: